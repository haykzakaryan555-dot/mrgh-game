<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>RGH - Գլխավոր Մուտք</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 35px 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 320px; text-align: center; border: 1px solid #e3e3e3; }
        .logo { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: none; border-color: #393b3d; }
        button { width: 100%; padding: 12px; background: #393b3d; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        button:hover { background: #222; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">RGH SYSTEM</div>
        <input type="email" id="email" placeholder="Էլ. հասցե">
        <input type="password" id="pass" placeholder="Գաղտնաբառ">
        <button id="loginBtn">Մուտք</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMX2P4uPPL1N2dsh0qEW57rjZc1Z-pyXs",
            authDomain: "mrgh-game.firebaseapp.com",
            databaseURL: "https://mrgh-game-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mrgh-game",
            appId: "1:866665514728:web:d5179ce6836828531a2b5d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            signInWithEmailAndPassword(auth, email, pass).then((userCredential) => {
    const uid = userCredential.user.uid;

    // 1. ՍԱ ՔՈ UID-Ն Է (Հայկ)
    const MY_UID = "D08Zx64RABbI3ETaXu31TMIYeWk2";
    
    // 2. ՍԱ ԱԴՄԻՆԻ UID-Ն Է (Փոխիր սա իսկականով)
    const ADMIN_UID = "Ic0XpL2241WgbiMBclfe838HhA52";

    if (uid === MY_UID) {
        // Եթե դու ես՝ գնա քո էջը
        window.location.href = "dashboard1.html";
    } 
    else if (uid === ADMIN_UID) {
        // Եթե ադմինն է՝ գնա ադմինի էջը
        window.location.href = "admin.html";
    } 
    else if (uid === "ԸՆԿԵՐՈՋ_UID") {
        // Եթե ընկերդ է՝ գնա dashboard2
        window.location.href = "dashboard2.html";
    }
    else {
        // Եթե օգտատերը կա բազայում, բայց UID-ն վերևի ցուցակում չկա
        alert("Մուտքը հաստատված է, բայց ձեր անձնական էջը դեռ պատրաստ չէ։");
    }

}).catch(err => {
    alert("Սխալ էլ. հասցե կամ գաղտնաբառ։");
});

    </script>
</body>
</html>
