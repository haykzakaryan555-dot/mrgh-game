<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>RGH - Admin Panel</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <h2>Admin Management</h2>
    <div id="users"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMX2P4uPPL1N2dsh0qEW57rjZc1Z-pyXs",
            authDomain: "mrgh-game.firebaseapp.com",
            databaseURL: "https://mrgh-game-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mrgh-game",
            appId: "1:866665514728:web:d5179ce6836828531a2b5d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const ADMIN_UID = "D08Zx64RABbI3ETaXu31TMIYeWk2";

        onAuthStateChanged(auth, (user) => {
            if (user && user.uid === ADMIN_UID) {
                onValue(ref(db, 'users'), (snapshot) => {
                    const users = snapshot.val();
                    const container = document.getElementById('users');
                    container.innerHTML = "";
                    for (let uid in users) {
                        const u = users[uid];
                        const isDone = u.tasks && u.tasks.task1;
                        container.innerHTML += `
                            <div class="card">
                                <b>${u.username}</b> (Coins: ${u.coins})<br><br>
                                Tower Battles: 
                                <button ${isDone ? 'disabled' : ''} onclick="window.pay('${uid}')">
                                    ${isDone ? 'Վճարված' : 'Վճարել 100 🪙'}
                                </button>
                            </div>`;
                    }
                });
            } else { window.location.href = "dashboard.html"; }
        });

        window.pay = (uid) => {
            const updates = {};
            updates[`users/${uid}/coins`] = increment(100);
            updates[`users/${uid}/tasks/task1`] = true;
            update(ref(db), updates).then(() => alert("Փողը ուղարկվեց:"));
        };
    </script>
</body>
</html>
