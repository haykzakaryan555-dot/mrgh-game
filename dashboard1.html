<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>My RGH Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f2f4f5; margin: 0; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-around; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="header">
        <b>RGH - MY PAGE</b>
        <div>Coins: <span id="coins">--</span></div>
        <div>Level: <span id="lvl">--</span></div>
        <div id="name">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDMX2P4uPPL1N2dsh0qEW57rjZc1Z-pyXs",
            authDomain: "mrgh-game.firebaseapp.com",
            databaseURL: "https://mrgh-game-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mrgh-game",
            appId: "1:866665514728:web:d5179ce6836828531a2b5d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const MY_UID = "D08Zx64RABbI3ETaXu31TMIYeWk2"; // Քո UID-ն

        onValue(ref(db, 'users/' + MY_UID), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('name').innerText = data.username;
                document.getElementById('coins').innerText = data.coins;
                document.getElementById('lvl').innerText = data.level;
            }
        });
    </script>
</body>
</html>
