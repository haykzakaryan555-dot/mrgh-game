<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGH Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f2f4f5;
            color: #333;
        }

        /* Header-ը նկարիդ նման */
        .header {
            background: white;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            border-bottom: 1px solid #e3e3e3;
        }

        .logo { font-weight: bold; font-size: 20px; color: #555; }

        .stats-container {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        /* Կլորիկ սիմվոլները (Level, Coins) */
        .circle-icon {
            width: 32px;
            height: 32px;
            background: #fdf2d0; /* Դեղնավուն ֆոն */
            border: 1px solid #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .avatar-img {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            background: #eee;
        }

        /* Խաղերի ցուցակը (Bedwars և այլն) */
        .main-content {
            padding: 40px 50px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .game-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            gap: 25px;
            margin-bottom: 15px;
            border: 1px solid #e3e3e3;
        }

        .game-thumb {
            width: 180px;
            height: 180px;
            background: #333;
            border-radius: 8px;
            object-fit: cover;
        }

        .game-details h2 { margin: 0; font-size: 32px; }
        .game-status { color: #2ecc71; font-size: 14px; margin: 10px 0; }

        .btn-connect {
            background: #393b3d;
            color: white;
            border: none;
            padding: 10px 50px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">RGH</div>
        
        <div class="stats-container">
            <div class="stat-item">
                <div class="circle-icon" style="background: #efefef; border-radius: 3px;">1</div>
                <span>Уровень: <b id="dispLevel">--</b></span>
            </div>
            
            <div class="stat-item">
                <div class="circle-icon">C</div>
                <span id="dispCoins">--</span>
            </div>
        </div>

        <div class="profile-section">
            <img src="https://tr.rbxcdn.com/38c353381a3e62f02697b055d7877259/420/420/Avatar/Png" class="avatar-img" alt="Avatar">
            <span id="userName">haykkingbro</span>
        </div>
    </div>

    <div class="main-content">
        <div class="game-card">
            <img src="https://tr.rbxcdn.com/18791039f67a29486c35c8e3128919f4/420/420/Image/Png" class="game-thumb">
            <div class="game-details">
                <h2>Bedwars</h2>
                <div class="game-status">Завершено</div>
                <button class="btn-connect">Подключиться</button>
            </div>
        </div>

        <div class="game-card">
            <img src="https://tr.rbxcdn.com/15f60641372337d45f448e894c25a17a/420/420/Image/Png" class="game-thumb">
            <div class="game-details">
                <h2>Legends Of Speed</h2>
                <div class="game-status" style="color: red;">Еще осталось</div>
                <button class="btn-connect">Подключиться</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMX2P4uPPL1N2dsh0qEW57rjZc1Z-pyXs",
            authDomain: "mrgh-game.firebaseapp.com",
            databaseURL: "https://mrgh-game-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mrgh-game",
            appId: "1:866665514728:web:d5179ce6836828531a2b5d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userRef = ref(db, 'users/' + user.uid);
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('dispCoins').innerText = data.coins;
                        document.getElementById('dispLevel').innerText = data.level;
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
