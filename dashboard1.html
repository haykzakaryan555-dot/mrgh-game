<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>Game Dashboard</title>
    <style>
        /* Ընդհանուր դիզայն */
        body { font-family: 'Trebuchet MS', sans-serif; background: #ffffff; margin: 0; padding: 0; color: #000; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* Վերևի պանել (Header) */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px dotted #ccc; margin-bottom: 20px; }
        .stats { display: flex; align-items: center; gap: 40px; font-size: 18px; }
        
        /* Ռանգի դիզայն */
        .rank-box { 
            background: #fdf5c9; border: 1px solid #d4c57c; padding: 5px 15px; 
            font-size: 20px; font-weight: bold; position: relative; cursor: pointer;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .rank-box:hover { transform: scale(1.05); }
        .rank-box::before { /* Անկյան էֆֆեկտի իմիտացիա */
            content: ''; position: absolute; top: -1px; left: -1px; border: 5px solid transparent; border-top-color: #fff; border-left-color: #fff;
        }

        /* Լևելի և փողի դիզայն */
        .level-text { cursor: pointer; font-weight: bold; transition: 0.2s; }
        .level-text:hover { color: #f39c12; }
        
        .coin-display { display: flex; align-items: center; gap: 10px; font-size: 18px; }
        .coin-icon { 
            background: #fdf5c9; border: 1px solid #d4c57c; border-radius: 50%; 
            width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 20px; color: #000;
        }

        /* Օգտատիրոջ պրոֆիլ */
        .profile { display: flex; align-items: center; gap: 15px; cursor: pointer; position: relative; }
        .profile img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .profile-name { font-size: 18px; padding-bottom: 5px; border-bottom: 1px solid #000; width: 150px; display: flex; justify-content: space-between; align-items: center;}
        
        /* Dropdown Մենյու */
        .dropdown { display: none; position: absolute; top: 60px; right: 0; background: white; border: 1px solid #4285f4; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 165px; z-index: 100; }
        .dropdown div { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 16px; }
        .dropdown div:hover { background: #f5f5f5; }

        /* Խաղերի ցուցակ */
        .game-list { display: flex; flex-direction: column; gap: 20px; }
        .game-card { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px dotted #ccc; padding-bottom: 20px; }
        .game-info-wrapper { display: flex; align-items: center; gap: 30px; }
        .game-image { width: 150px; height: 150px; border-radius: 10px; object-fit: cover; }
        .game-details h2 { margin: 0 0 10px 0; font-size: 28px; }
        
        /* Ստատուսներ */
        .status { font-size: 14px; margin-bottom: 15px; }
        .status.done { color: #00d200; } /* Կանաչ */
        .status.pending { color: #ff0000; } /* Կարմիր */

        /* Կոճակներ */
        .btn { background: #333; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 3px; font-family: 'Trebuchet MS'; }
        .btn:hover { background: #444; }

        /* Մոդալ Պատուհաններ (Popups) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; max-width: 600px; width: 100%; border-radius: 5px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #888; }
        
        /* Առաջադրանքների ցուցակ մոդալում */
        .task-list { margin-top: 20px; }
        .task-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px dotted #ccc; padding: 15px 0; font-size: 18px;}
        .task-item.passed { color: #00d200; }
        .task-item.pending { color: #000; }
        .task-desc { display: flex; align-items: center; gap: 10px; }
        .task-reward { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="stats">
            <div class="rank-box" onclick="openRankModal()" id="user-rank">1</div>
            <div class="level-text" onclick="openLevelModal()">Уровень: <span id="user-level">...</span></div>
            <div class="coin-display">
                <div class="coin-icon">C</div>
                <span id="user-coins">...</span>
            </div>
        </div>

        <div class="profile" onclick="toggleDropdown()">
            <img id="user-avatar" src="" alt="Avatar">
            <div class="profile-name">
                <span id="user-name">...</span>
                <span>˅</span>
            </div>
            <div class="dropdown" id="profile-dropdown">
                <div onclick="logout()">Выйти</div>
            </div>
        </div>
    </div>

    <div class="game-list" id="games-container">
        </div>
</div>

<div class="modal-overlay" id="tasksModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModals()">&times;</span>
        <h2 id="modal-game-name">Название Игры</h2>
        <div class="task-list" id="modal-task-list"></div>
        <br>
        <button class="btn" id="play-btn" onclick="playGame()">Играть</button>
    </div>
</div>

<div class="modal-overlay" id="levelModal">
    <div class="modal-content" style="text-align: center;">
        <span class="close-btn" onclick="closeModals()">&times;</span>
        <h2>Улучшение Уровня</h2>
        <p>Для перехода на следующий уровень требуется: <b id="level-cost">0</b> coins.</p>
        <button class="btn" onclick="upgradeLevel()" style="background: #27ae60;">Улучшить</button>
    </div>
</div>

<div class="modal-overlay" id="rankModal">
    <div class="modal-content" style="text-align: center;">
        <span class="close-btn" onclick="closeModals()">&times;</span>
        <h2>Повышение Ранга</h2>
        <p>Для получения следующего ранга нужен <b>Уровень 10</b> и <b id="rank-cost">0</b> coins.</p>
        <button class="btn" onclick="upgradeRank()" style="background: #f39c12; color: #000;">Повысить ранг</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMX2P4uPPL1N2dsh0qEW57rjZc1Z-pyXs",
        authDomain: "mrgh-game.firebaseapp.com",
        databaseURL: "https://mrgh-game-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mrgh-game",
        appId: "1:866665514728:web:d5179ce6836828531a2b5d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const currentUid = "SOHqHyiFeEVu2lp2uwBAq6ZQ06N2";

    let userData = {}; 
    let globalSettings = { levelPrice: 50, rankPrice: 500 }; 
    let currentGameUrl = "";

    // 1. Կարգավորումների բեռնում Firebase-ից
    onValue(ref(db, 'settings'), (snapshot) => {
        if (snapshot.exists()) {
            globalSettings = snapshot.val();
        }
    });

    // 2. Օգտատիրոջ տվյալների բեռնում իրական ժամանակում
    onValue(ref(db, `users/${currentUid}`), (snapshot) => {
        userData = snapshot.val() || {};
        document.getElementById('user-coins').innerText = userData.coins || 0;
        document.getElementById('user-level').innerText = userData.level || 1;
        document.getElementById('user-rank').innerText = userData.rank || 1;
        document.getElementById('user-name').innerText = userData.username || "Player";
        if(userData.avatar) document.getElementById('user-avatar').src = userData.avatar;
    });

    // 3. Խաղերի և առաջադրանքների ստատուսի բեռնում
    onValue(ref(db, `users/${currentUid}/games`), (snapshot) => {
        const container = document.getElementById('games-container');
        container.innerHTML = "";
        snapshot.forEach((child) => {
            const game = child.val();
            const gameId = child.key;
            
            let allPassed = true;
            let tasksObj = game.tasks || {};
            let hasTasks = Object.keys(tasksObj).length > 0;

            Object.values(tasksObj).forEach(t => { if(t.status !== 'passed') allPassed = false; });

            const statusClass = (hasTasks && allPassed) ? 'done' : 'pending';
            const statusText = (hasTasks && allPassed) ? 'Завершено' : 'Еще осталось';

            container.innerHTML += `
                <div class="game-card">
                    <div class="game-info-wrapper">
                        <img src="${game.image}" class="game-image">
                        <div class="game-details">
                            <h2>${game.name}</h2>
                            <div class="status ${statusClass}">${statusText}</div>
                            <button class="btn" onclick="window.openGameTasks('${gameId}')">Подключиться</button>
                        </div>
                    </div>
                </div>
            `;
        });
    });

    // --- Ֆունկցիաներ HTML-ի onclick-ների համար (window. նախդիրով) ---

    window.toggleDropdown = () => {
        const d = document.getElementById('profile-dropdown');
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    };

    window.closeModals = () => {
        document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
    };

    window.openGameTasks = async (gameId) => {
        const snap = await get(ref(db, `users/${currentUid}/games/${gameId}`));
        const game = snap.val();
        currentGameUrl = game.url;
        document.getElementById('modal-game-name').innerText = game.name;
        
        const listDiv = document.getElementById('modal-task-list');
        listDiv.innerHTML = "";
        if(game.tasks) {
            Object.values(game.tasks).forEach(t => {
                listDiv.innerHTML += `
                    <div class="task-item ${t.status === 'passed' ? 'passed' : ''}">
                        <span>→ ${t.desc}</span>
                        <div style="display:flex; align-items:center; gap:5px;">
                            <b>${t.cost}</b> <div class="coin-icon" style="width:20px;height:20px;font-size:12px;">C</div>
                        </div>
                    </div>`;
            });
        }
        document.getElementById('tasksModal').style.display = 'flex';
    };

    window.playGame = () => { if(currentGameUrl) window.open(currentGameUrl, '_blank'); };

    window.openLevelModal = () => {
        const cost = userData.level * globalSettings.levelPrice;
        document.getElementById('level-cost').innerText = cost;
        document.getElementById('next-lvl-num').innerText = (userData.level || 1) + 1;
        document.getElementById('levelModal').style.display = 'flex';
    };

    window.upgradeLevel = async () => {
        const cost = userData.level * globalSettings.levelPrice;
        if (userData.coins >= cost) {
            await update(ref(db, `users/${currentUid}`), {
                coins: userData.coins - cost,
                level: userData.level + 1
            });
            window.closeModals();
        } else { alert("Недостаточно монет!"); }
    };

    window.openRankModal = () => {
        document.getElementById('rank-cost').innerText = globalSettings.rankPrice;
        document.getElementById('rankModal').style.display = 'flex';
    };

    window.upgradeRank = async () => {
        if (userData.level < 10) {
            alert("Нужен уровень 10!");
            return;
        }
        if (userData.coins >= globalSettings.rankPrice) {
            await update(ref(db, `users/${currentUid}`), {
                coins: userData.coins - globalSettings.rankPrice,
                level: 1,
                rank: (userData.rank || 1) + 1
            });
            window.closeModals();
        } else { alert("Недостаточно монет!"); }
    };

    window.logout = () => { window.location.href = "index.html"; };

    window.onclick = (e) => {
        if (e.target.classList.contains('modal-overlay')) window.closeModals();
        if (!e.target.closest('.profile')) document.getElementById('profile-dropdown').style.display = 'none';
    };
</script>

</body>
</html>
