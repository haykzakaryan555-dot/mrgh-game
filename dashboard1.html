<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>Game Dashboard</title>
    <style>
        /* Ընդհանուր դիզայն */
        body { font-family: 'Trebuchet MS', sans-serif; background: #ffffff; margin: 0; padding: 0; color: #000; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px dotted #ccc; margin-bottom: 20px; }
        .stats { display: flex; align-items: center; gap: 40px; font-size: 18px; }
        
        /* Ռանգի դիզայն */
        .rank-box {
            position: relative; width: 36px; height: 36px; margin-left: 12px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold;
            cursor: pointer; border: 1px solid #000; transform-style: preserve-3d; z-index: 10;
        }

        .rank-box::before {
            content: ''; position: absolute; top: 50%; left: -12px; right: -12px; height: 14px;
            border: 1px solid #000; background-color: inherit; transform: translateY(-50%) translateZ(-1px); z-index: -1;
        }

        .rank-box:hover { transform: scale(1.1) rotate(3deg); }

        /* Ռանգերի գույները */
        .rank-1 { background: radial-gradient(circle, #fffbe0, #ffd700); color: #000; }
        .rank-2 { background: radial-gradient(circle, #fff5e6, #ff8c00); color: #fff; }
        .rank-3 { background: radial-gradient(circle, #e6f7ff, #1e90ff); color: #fff; }
        .rank-4 { background: radial-gradient(circle, #f9f0ff, #ba55d3); color: #fff; }
        .rank-5 { background: radial-gradient(circle, #f5e6ea, #800020); color: #fff; }
        .rank-6 { background: radial-gradient(circle, #fbeee6, #d35400); color: #fff; }
        .rank-7 { background: radial-gradient(circle, #eae6f5, #4b0082); color: #fff; }
        .rank-8 { background: radial-gradient(circle, #e6e6f5, #00008b); color: #fff; }
        .rank-9 { background: radial-gradient(circle, #333, #111); color: #ffd700; border-color: #ffd700; }

        .level-text { cursor: pointer; font-weight: bold; transition: 0.2s; }
        .coin-display { display: flex; align-items: center; gap: 10px; font-size: 18px; }
        .coin-icon { background: #fdf5c9; border: 1px solid #d4c57c; border-radius: 50%; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; font-weight: bold; }

        .profile { display: flex; align-items: center; gap: 15px; cursor: pointer; position: relative; }
        .profile img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .profile-name { font-size: 18px; border-bottom: 1px solid #000; width: 150px; display: flex; justify-content: space-between; }
        
        .dropdown { display: none; position: absolute; top: 60px; right: 0; background: white; border: 1px solid #4285f4; width: 165px; z-index: 100; }
        .dropdown div { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; }

        .game-card { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px dotted #ccc; padding-bottom: 20px; margin-top: 20px; }
        .game-info-wrapper { display: flex; align-items: center; gap: 30px; }
        .game-image { width: 150px; height: 150px; border-radius: 10px; }
        
        .status.done { color: #00d200; } 
        .status.pending { color: #ff0000; }
        .btn { background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 3px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; max-width: 600px; width: 100%; border-radius: 5px; position: relative; text-align: center; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }
        .promo-input-style { width: 80%; padding: 10px; margin-bottom: 20px; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="stats">
            <div class="rank-box" onclick="openRankModal()" id="user-rank">1</div>
            <div class="level-text" onclick="openLevelModal()">Уровень: <span id="user-level">...</span></div>
            <div class="coin-display">
                <div class="coin-icon">C</div>
                <span id="user-coins">...</span>
            </div>
        </div>

        <div class="profile" onclick="toggleDropdown()">
            <img id="user-avatar" src="" alt="Avatar">
            <div class="profile-name">
                <span id="user-name">...</span>
                <span>˅</span>
            </div>
            <div class="dropdown" id="profile-dropdown">
                <div onclick="openPromoModal()">Промокоды</div>
                <div onclick="logout()">Выйти</div>
            </div>
        </div>
    </div>
    <div class="game-list" id="games-container"></div>
</div>

<div class="modal-overlay" id="promoModal"><div class="modal-content"><span class="close-btn" onclick="closeModals()">&times;</span><h2>Промокод</h2><input type="text" id="promo-input" class="promo-input-style"><br><button class="btn" onclick="activatePromo()" style="background: #27ae60;">Активировать</button></div></div>
<div class="modal-overlay" id="levelModal"><div class="modal-content"><span class="close-btn" onclick="closeModals()">&times;</span><h2>Улучшение Уровня</h2><p>Требуется: <b id="level-cost">0</b> coins.</p><button class="btn" onclick="upgradeLevel()" style="background: #27ae60;">Улучшить</button></div></div>
<div class="modal-overlay" id="rankModal"><div class="modal-content"><span class="close-btn" onclick="closeModals()">&times;</span><h2>Повышение Ранга</h2><p>Нужен Уровень 10 և <b id="rank-cost">0</b> coins.</p><button class="btn" onclick="upgradeRank()" style="background: #f39c12; color: #000;">Повысить ранг</button></div></div>
<div class="modal-overlay" id="tasksModal"><div class="modal-content"><span class="close-btn" onclick="closeModals()">&times;</span><h2 id="modal-game-name"></h2><div id="modal-task-list"></div><br><button class="btn" onclick="playGame()">Играть</button></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMX2P4uPPL1N2dsh0qEW57rjZc1Z-pyXs",
        authDomain: "mrgh-game.firebaseapp.com",
        databaseURL: "https://mrgh-game-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mrgh-game",
        appId: "1:866665514728:web:d5179ce6836828531a2b5d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const MY_PAGE_UID = "SOHqHyiFeEVu2lp2uwBAq6ZQ06N2";
    
    let userData = {}; 
    let currentGameUrl = "";

    // --- ԱՆՀԱՏԱԿԱՆ ԳՆԵՐԻ ՖՈՒՆԿՑԻԱՆԵՐ ---
    function getLevelCost(currentLevel) {
        const pricePerLevel = userData.levelPrice || 100; 
        return currentLevel * pricePerLevel;
    }

    window.upgradeLevel = async () => {
        const cost = getLevelCost(userData.level);
        if (userData.coins >= cost) {
            await update(ref(db, `users/${MY_PAGE_UID}`), {
                coins: userData.coins - cost,
                level: (userData.level || 1) + 1
            });
            closeModals();
        } else { alert("Недостаточно монет!"); }
    };

    window.upgradeRank = async () => {
        if (userData.level < 10) { alert("Нужен уровень 10!"); return; }
        const currentRankCost = userData.rankPrice || 1000;
        if (userData.coins >= currentRankCost) {
            await update(ref(db, `users/${MY_PAGE_UID}`), {
                coins: userData.coins - currentRankCost,
                rank: (userData.rank || 1) + 1,
                level: userData.level + 1 
            });
            closeModals();
        } else { alert("Недостаточно монет!"); }
    };

    // --- ՏՎՅԱԼՆԵՐԻ ԲԵՌՆՈՒՄ ---
    onAuthStateChanged(auth, (user) => {
        if (user && user.uid === MY_PAGE_UID) {
            loadUserData();
            loadUserGames();
        } else { window.location.href = "index.html"; }
    });

    function loadUserData() {
        onValue(ref(db, `users/${MY_PAGE_UID}`), (snapshot) => {
            userData = snapshot.val() || {};
            document.getElementById('user-coins').innerText = userData.coins || 0;
            document.getElementById('user-level').innerText = userData.level || 1;
            document.getElementById('user-name').innerText = userData.username || "Player";
            document.getElementById('user-avatar').src = userData.avatar || "";

            let rankEl = document.getElementById('user-rank');
            let r = userData.rank || 1;
            rankEl.innerText = r;
            rankEl.className = 'rank-box rank-' + (r > 9 ? 9 : r);
        });
    }

    function loadUserGames() {
        onValue(ref(db, `users/${MY_PAGE_UID}/games`), (snapshot) => {
            const container = document.getElementById('games-container');
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const game = child.val();
                container.innerHTML += `
                    <div class="game-card">
                        <div class="game-info-wrapper">
                            <img src="${game.image}" class="game-image">
                            <div class="game-details">
                                <h2>${game.name}</h2>
                                <button class="btn" onclick="openGameTasks('${child.key}')">Подключиться</button>
                            </div>
                        </div>
                    </div>`;
            });
        });
    }

    // --- ՄՈԴԱԼՆԵՐԻ ԲԱՑՈՒՄ ---
    window.openLevelModal = () => {
        document.getElementById('level-cost').innerText = getLevelCost(userData.level);
        document.getElementById('levelModal').style.display = 'flex';
    };

    window.openRankModal = () => {
        document.getElementById('rank-cost').innerText = userData.rankPrice || 1000;
        document.getElementById('rankModal').style.display = 'flex';
    };

    window.openGameTasks = async (id) => {
        const snap = await get(ref(db, `users/${MY_PAGE_UID}/games/${id}`));
        const game = snap.val();
        currentGameUrl = game.url;
        document.getElementById('modal-game-name').innerText = game.name;
        document.getElementById('tasksModal').style.display = 'flex';
    };

    window.activatePromo = async () => {
        const code = document.getElementById('promo-input').value.trim();
        const snap = await get(ref(db, `promocodes/${code}`));
        if (snap.exists()) {
            const reward = parseInt(snap.val().reward);
            await update(ref(db, `users/${MY_PAGE_UID}`), { coins: (userData.coins || 0) + reward });
            alert("Бонус получен!"); closeModals();
        } else { alert("Код не найден!"); }
    };

    window.toggleDropdown = () => {
        const d = document.getElementById('profile-dropdown');
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    };
    window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
    window.playGame = () => { if(currentGameUrl) window.open(currentGameUrl, '_blank'); };
    window.logout = () => auth.signOut().then(() => window.location.href = "index.html");
</script>
</body>
</html>
