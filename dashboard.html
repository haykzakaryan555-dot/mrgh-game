<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>RGH - Dashboard</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f2f4f5; }
        .header { background: white; height: 65px; display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid #ddd; }
        .stat-group { display: flex; align-items: center; gap: 8px; }
        .stat-icon { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .user-menu { position: relative; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .dropdown { display: none; position: absolute; top: 50px; right: 0; background: white; border: 1px solid #ddd; width: 150px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .dropdown.active { display: block; }
        .dropdown div { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .game-card { background: white; max-width: 600px; margin: 20px auto; padding: 20px; border-radius: 8px; display: flex; gap: 20px; align-items: center; border: 1px solid #ddd; }
        .status-ok { color: #2ecc71; font-weight: bold; }
        .status-wait { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-weight:bold">RGH</div>
        <div class="stat-group">
            <div class="stat-icon" style="background:#fdf2d0; border-color:#d4af37">C</div>
            <span id="dispCoins">0</span>
        </div>
        <div class="user-menu" onclick="document.getElementById('drop').classList.toggle('active')">
            <span id="dispName">Player</span> ▼
            <div class="dropdown" id="drop">
                <div>Промокоды</div>
                <div>Ранки</div>
                <div onclick="location.href='index.html'" style="color:red">Выйти</div>
                <div style="color:#bbb; font-size:10px">Версия 5.0.5</div>
            </div>
        </div>
    </div>

    <div id="gameList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMX2P4uPPL1N2dsh0qEW57rjZc1Z-pyXs",
            authDomain: "mrgh-game.firebaseapp.com",
            databaseURL: "https://mrgh-game-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mrgh-game",
            appId: "1:866665514728:web:d5179ce6836828531a2b5d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('dispName').innerText = data.username || "Player";
                        document.getElementById('dispCoins').innerText = data.coins || 0;
                        renderGames(data.tasks || {});
                    }
                });
            }
        });

        function renderGames(tasks) {
            const gameList = document.getElementById('gameList');
            const game = { id: "task1", name: "Tower Battles", img: "https://tr.rbxcdn.com/18791039f67a29486c35c8e3128919f4/420/420/Image/Png" };
            const isDone = tasks[game.id] === true;
            gameList.innerHTML = `
                <div class="game-card">
                    <img src="${game.img}" width="100">
                    <div>
                        <h3>${game.name}</h3>
                        <p class="${isDone ? 'status-ok' : 'status-wait'}">${isDone ? 'Завершено' : 'Еще осталось'}</p>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
