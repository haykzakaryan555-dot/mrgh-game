<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGH - Dashboard</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f2f4f5; }
        .header { background: white; height: 70px; display: flex; align-items: center; justify-content: space-around; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .stat-group { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .stat-icon { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ccc; }
        .coin-icon { background: #fdf2d0; border-color: #d4af37; color: #b8860b; }
        .user-section { position: relative; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 5px 15px; border-radius: 8px; }
        #userAvatar { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; border: 1px solid #ddd; }
        .dropdown-menu { display: none; position: absolute; top: 60px; right: 0; background: white; border: 1px solid #ddd; width: 200px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 5px; overflow: hidden; }
        .dropdown-menu.active { display: block; }
        .dropdown-item { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 15px; }
        .game-card { background: white; border-radius: 10px; border: 1px solid #e0e0e0; display: flex; padding: 25px; gap: 25px; align-items: center; }
        .status-done { color: #2ecc71; font-weight: bold; }
        .status-wait { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 800; font-size: 24px;">RGH</div>
        
        <div style="display: flex; gap: 35px;">
            <div class="stat-group">
                <div class="stat-icon" style="background:#eee;">1</div>
                Уровень: <span id="dispLevel">--</span>
            </div>
            <div class="stat-group">
                <div class="stat-icon coin-icon">C</div>
                <span id="dispCoins">--</span>
            </div>
        </div>

        <div class="user-section" onclick="document.getElementById('userDropdown').classList.toggle('active')">
            <img id="userAvatar" src="https://tr.rbxcdn.com/38c353381a3e62f02697b055d7877259/420/420/Avatar/Png" alt="Avatar">
            <div style="display: flex; flex-direction: column;">
                <span id="dispName" style="font-weight: 600;">Player</span>
                <span id="dispRankHeader" style="font-size: 11px; color: #888;">Rank: --</span>
            </div>
            <div class="dropdown-menu" id="userDropdown">
                <div class="dropdown-item"><b>Ранг:</b> <span id="dispRankMenu">--</span></div>
                <div class="dropdown-item">Промокоды</div>
                <div class="dropdown-item" onclick="logout()" style="color:red; cursor:pointer;">Выйти</div>
                <div style="font-size:10px; color:#bbb; padding:10px;">Версия 5.0.5</div>
            </div>
        </div>
    </div>

    <div class="container" id="gameList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
    apiKey: "AIzaSyDMX2P4uPPL1N2dsh0qEW57rjZc1Z-pyXs",
    authDomain: "mrgh-game.firebaseapp.com",
    databaseURL: "https://mrgh-game-default-rtdb.europe-west1.firebasedatabase.app", // ՍԱ ԱՆՊԱՅՄԱՆ ԴԻՐ
    projectId: "mrgh-game",
    appId: "1:866665514728:web:d5179ce6836828531a2b5d"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.logout = () => signOut(auth).then(() => window.location.href = "index.html");

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('dispName').innerText = data.username || "Player";
                        document.getElementById('dispCoins').innerText = data.coins || 0;
                        document.getElementById('dispLevel').innerText = data.level || 1;
                        document.getElementById('dispRankHeader').innerText = "Rank: " + (data.rank || "Новичок");
                        document.getElementById('dispRankMenu').innerText = data.rank || "Новичок";
                        renderGames(data.tasks || {});
                    }
                });
            } else { window.location.href = "index.html"; }
        });

        function renderGames(tasks) {
            const list = document.getElementById('gameList');
            const isDone = tasks.task1 === true;
            list.innerHTML = `
                <div class="game-card">
                    <img src="https://tr.rbxcdn.com/18791039f67a29486c35c8e3128919f4/420/420/Image/Png" width="100" style="border-radius:10px;">
                    <div>
                        <h2>Tower Battles</h2>
                        <p class="${isDone ? 'status-done' : 'status-wait'}">${isDone ? '● Завершено' : '● Еще осталось'}</p>
                        <button style="padding:10px 20px; background:#333; color:white; border:none; border-radius:5px; cursor:pointer;">Подключиться</button>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
